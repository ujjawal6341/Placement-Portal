{% extends "base.html" %}

{% block content %}

<h3>Students</h3>

<form method="POST" action="/admin/search_students">

</form>

<br>

<table class="table table-striped table-hover">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for student in students %}

<tr>

<td>{{student.id}}</td>
<td>{{student.name}}</td>
<td>{{student.email}}</td>

<td>

{% if student.active %}
Active
{% else %}
Blacklisted
{% endif %}

</td>

<td>

<a href="/blacklist_student/{{student.id}}" class="btn btn-danger btn-sm">
Blacklist
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
